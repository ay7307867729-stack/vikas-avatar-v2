<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikas AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 Vikas AI</h1>

    <div class="avatar-box">
        <img id="avatar"
             src="{{ url_for('static', filename='assets/avatar.png') }}"
             alt="Avatar">
    </div>

    <div class="chat-box">
        <p id="response">
            Hello! I am Vikas AI. How can I help you?
        </p>
    </div>

    <div class="controls">
        <button id="voiceBtn">🎤 Speak</button>
        <button id="talkBtn">🔊 Talk</button>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
