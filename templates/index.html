<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anaya AI — Cute AI Companion</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🌸 <span class="brand-script">Anaya</span> AI</h1>

    <!-- 3D Avatar Area -->
    <div class="avatar-box">
        <div id="avatar"></div>
    </div>

    <!-- AI Response -->
    <div class="chat-box">
        <p id="response"></p>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button id="talkBtn">🔊 Talk</button>
        <button id="chatBtn" class="chat-open-btn" type="button">💬 Chat</button>
    </div>

    <div class="screen-watch-box" aria-label="Screen watching controls">
        <button id="screenWatchBtn" type="button"><span>🖥️</span> Vision</button>
        <button id="screenStopBtn" type="button" hidden>⏹ Stop Vision</button>
        <span id="screenStatus" class="screen-status" aria-live="polite">Off</span>
    </div>

    <!-- Song Player -->
    <div class="song-box">
        <button id="songBtn">🎵 Song Play</button>
        <p id="songStatus" class="song-status" aria-live="polite"></p>

        <iframe
            id="ytplayer"
            width="560"
            height="315"
            frameborder="0"
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

</div>

<!-- Snapchat-style AI chat overlay -->
<section id="chatOverlay" class="chat-overlay" aria-hidden="true" aria-label="AI chat">
    <div class="chat-panel">
        <header class="chat-header">
            <div class="chat-profile">
                <div class="chat-avatar">🌸</div>
                <div>
                    <strong>Anaya AI</strong>
                    <span><i></i> Online</span>
                </div>
            </div>
            <button id="closeChatBtn" class="chat-close-btn" type="button" aria-label="Close chat">×</button>
        </header>

        <div id="chatMessages" class="chat-messages" aria-live="polite">
            <div class="message ai-message">Namaste! Main Anaya hoon — tumhari sweet aur caring AI companion. Aaj kis baat par dil se baat karni hai? ✨😊</div>
        </div>

        <form id="chatForm" class="chat-input-row">
            <input id="chatInput" type="text" autocomplete="off" placeholder="Message Anaya AI..." aria-label="Message Anaya AI" required>
            <button id="chatSendBtn" type="submit" aria-label="Send message">➤</button>
        </form>
    </div>
</section>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
    window.modelUrl = "{{ url_for('static', filename='models/modelToUsed.glb') }}";

    // AI response handle
    function handleAIResponse(message){
        document.getElementById("response").innerText = message;

        // Agar user bole "song sunao"
        if(message.toLowerCase().includes("song sunao")){
            let songName = message.replace("song sunao", "").trim();
            playSong(songName); // yaha tumhara JS function call hoga
        }
    }

    // Example: simulate AI response
    // handleAIResponse("song sunao Tum Hi Ho");
</script>

<!-- Your JavaScript -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
